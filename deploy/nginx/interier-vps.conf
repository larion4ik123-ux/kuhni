server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/interier;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
