server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 194.147.78.106 _;

    return 301 https://194-147-78-106.sslip.io$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name 194-147-78-106.sslip.io;

    root /var/www/interier;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/194-147-78-106.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/194-147-78-106.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /opt/kitchen-platform/backend/media/;
        access_log off;
        expires 14d;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name 194-147-78-106.sslip.io;

    return 301 https://$host$request_uri;
}
